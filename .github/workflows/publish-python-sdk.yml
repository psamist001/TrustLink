name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "python-v*"

permissions:
  contents: read
  id-token: write  # required for trusted publishing (OIDC)

jobs:
  build-and-publish:
    name: Build and publish trustlink-sdk
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build source and wheel distributions
        working-directory: bindings/python
        run: python -m build

      - name: Validate distributions with twine
        working-directory: bindings/python
        run: twine check dist/*

      - name: Verify py.typed is present in wheel
        working-directory: bindings/python
        run: |
          WHEEL=$(ls dist/*.whl)
          python -c "
          import zipfile, sys
          whl = '$WHEEL'
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          marker = [n for n in names if n.endswith('py.typed')]
          if not marker:
              print('ERROR: py.typed not found in wheel:', names)
              sys.exit(1)
          print('OK: py.typed found at', marker[0])
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: bindings/python/dist/
